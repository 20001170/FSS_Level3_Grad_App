name: Build Windows EXE

# Run this build from the GitHub "Actions" tab (click "Run workflow"),
# and it also runs automatically whenever you upload/change files.
on:
  workflow_dispatch:        # lets you start it manually with a button
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest   # GitHub gives us a real Windows machine

    steps:
      - name: Get the app files
        uses: actions/checkout@v4

      - name: Set up Python (only on the build machine, not for end users)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools and app dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller flask openpyxl python-docx reportlab

      - name: Download and bundle Poppler (so the EXE reads PDFs on its own)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $pinned = "https://github.com/oschwartz10612/poppler-windows/releases/download/v24.08.0-0/Release-24.08.0-0.zip"
          $ok = $false
          try {
            Write-Host "Trying pinned Poppler release..."
            Invoke-WebRequest -Uri $pinned -OutFile poppler.zip -UseBasicParsing
            $ok = $true
          } catch {
            Write-Host "Pinned release not available; finding the latest release asset..."
          }
          if (-not $ok) {
            $api = "https://api.github.com/repos/oschwartz10612/poppler-windows/releases/latest"
            $headers = @{ "User-Agent" = "gh-actions"; "Accept" = "application/vnd.github+json" }
            $rel = Invoke-RestMethod -Uri $api -Headers $headers
            $asset = $rel.assets | Where-Object { $_.name -like "Release-*.zip" } | Select-Object -First 1
            if (-not $asset) { throw "No Poppler Release zip found in the latest release." }
            Write-Host ("Downloading " + $asset.name + " ...")
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile poppler.zip -UseBasicParsing
          }
          Expand-Archive -Path poppler.zip -DestinationPath poppler_raw -Force
          $bin = Get-ChildItem -Path poppler_raw -Recurse -Filter pdftotext.exe | Select-Object -First 1
          if (-not $bin) { throw "pdftotext.exe not found in the Poppler download" }
          $binDir = $bin.Directory.FullName
          Write-Host "Poppler bin found at: $binDir"
          New-Item -ItemType Directory -Force -Path "poppler\bin" | Out-Null
          Copy-Item -Path "$binDir\*" -Destination "poppler\bin" -Recurse -Force
          Write-Host "Bundled these files into poppler\bin:"
          Get-ChildItem "poppler\bin" | Select-Object Name

      - name: Build the standalone EXE
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm fss_app.spec
          Write-Host "Build output:"
          Get-ChildItem dist

      - name: Upload the finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: FSS_Level3_Eligibility_Windows
          path: dist/FSS_Level3_Eligibility.exe
          if-no-files-found: error
